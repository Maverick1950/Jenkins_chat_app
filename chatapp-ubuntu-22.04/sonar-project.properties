sonar.projectKey=Jenkins-project
sonar.projectName=Jenkins-project
sonar.projectVersion=1.0

# IMPORTANT: only Django code
sonar.sources=fundoo

sonar.sourceEncoding=UTF-8
sonar.python.version=3

sonar.javascript.file.suffixes=.none
sonar.typescript.file.suffixes=.none

# exclusions
sonar.exclusions=**/venv/**,**/migrations/**,**/.git/**,**/__pycache__/**,static/**,media/**