sonar.projectKey=Jenkins-project
sonar.projectName=Jenkins-project
sonar.projectVersion=1.0

# ✅ Django backend only
sonar.sources=chatapp-ubuntu-22.04/fundoo

sonar.sourceEncoding=UTF-8
sonar.python.version=3

# 🚫 Disable JS/TS analysis completely
sonar.javascript.file.suffixes=
sonar.typescript.file.suffixes=

# 🚫 Hard exclusions (extra safety)
sonar.exclusions=**/*.js,**/*.ts,**/*.jsx,**/*.html,venv/**,**/migrations/**,.git/**,__pycache__/**,static/**,media/**